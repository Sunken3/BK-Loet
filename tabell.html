<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabell — BK Loet</title>
<meta name="description" content="Serietabellen för BK Loet i Nordallsvenskan.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1f4d;
    --navy-deep: #061230;
    --blue: #1d4fc4;
    --blue-bright: #2563eb;
    --gold: #f5c518;
    --gold-soft: #fde68a;
    --red: #dc2626;
    --white: #ffffff;
    --gray-50: #f8f9fc;
    --gray-100: #eef1f6;
    --gray-300: #cbd2dc;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--gray-900);
    background: var(--white);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ NAVBAR ============ */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-100);
  }
  .nav-container {
    max-width: 1280px; margin: 0 auto; padding: 1rem 2rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 0.75rem;
    text-decoration: none; color: var(--navy);
  }
  .nav-logo-mark { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }
  .nav-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 0.05em; color: var(--navy);
  }
  .nav-logo-sub {
    font-size: 0.65rem; color: var(--gray-500);
    text-transform: uppercase; letter-spacing: 0.15em;
    display: block; margin-top: -2px;
  }
  .nav-links { display: flex; list-style: none; gap: 2rem; align-items: center; }
  .nav-links a {
    text-decoration: none; color: var(--gray-700);
    font-weight: 500; font-size: 0.9rem; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--blue); }
  .nav-links a.active { color: var(--blue); }
  .nav-cta {
    background: var(--navy); color: var(--white) !important;
    padding: 0.6rem 1.25rem; border-radius: 6px; transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--blue) !important; color: var(--white) !important; }
  .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; }
  .nav-toggle span {
    display: block; width: 24px; height: 2px;
    background: var(--navy); margin: 5px 0; transition: all 0.3s;
  }

  /* ============ PAGE HEADER ============ */
  .page-header {
    background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 100%);
    padding: 8rem 0 4rem;
    text-align: center;
  }
  .page-header .section-eyebrow {
    color: var(--gold); font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.2em;
    margin-bottom: 0.75rem; display: inline-block;
  }
  .page-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    color: var(--white); line-height: 1; margin-bottom: 1rem;
  }
  .page-header p {
    color: rgba(255,255,255,0.7); font-size: 1.05rem; max-width: 520px; margin: 0 auto;
  }

  /* ============ SECTION ============ */
  section { padding: 6rem 0; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }

  /* ============ TABELL ============ */
  #tabell { background: var(--navy-deep); color: var(--white); }
  .table-wrapper {
    max-width: 900px; margin: 0 auto;
    background: rgba(255,255,255,0.04);
    border-radius: 16px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .table-header {
    display: flex; justify-content: space-between;
    align-items: center;
    padding: 1.5rem 2rem;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .table-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem; letter-spacing: 0.05em;
  }
  .table-season { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
  .league-table { width: 100%; border-collapse: collapse; }
  .league-table th {
    text-align: left; padding: 1rem 1.5rem;
    font-size: 0.75rem; font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 0.1em;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .league-table th:not(:first-child):not(:nth-child(2)) { text-align: center; }
  .league-table td {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.95rem;
  }
  .league-table td:not(:first-child):not(:nth-child(2)) { text-align: center; }
  .league-table tbody tr:hover { background: rgba(255,255,255,0.03); }
  .league-table tbody tr.our-team { background: rgba(245, 197, 24, 0.08); }
  .league-table tbody tr.our-team td { font-weight: 600; color: var(--gold); }
  .position-cell {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem; color: var(--gold); width: 60px;
  }
  .promotion-indicator {
    display: inline-block; width: 4px; height: 16px;
    background: var(--gold); margin-right: 0.75rem;
    vertical-align: middle; border-radius: 2px;
  }
  .table-legend {
    padding: 1.25rem 2rem;
    background: rgba(0,0,0,0.2);
    font-size: 0.8rem; color: rgba(255,255,255,0.6);
    display: flex; gap: 1.5rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; background: var(--gold); }
  .table-disclaimer {
    text-align: center; margin-top: 1.5rem;
    color: rgba(255,255,255,0.5); font-size: 0.85rem;
  }

  /* ============ FOOTER ============ */
  footer {
    background: #030814; color: rgba(255,255,255,0.7);
    padding: 4rem 0 2rem;
  }
  .footer-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 3rem; margin-bottom: 3rem;
  }
  .footer-brand { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
  .footer-brand-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; color: var(--white); letter-spacing: 0.05em;
  }
  .footer-tagline { color: rgba(255,255,255,0.5); font-size: 0.9rem; max-width: 320px; line-height: 1.6; }
  .footer-col h4 {
    color: var(--white); font-size: 0.85rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 1rem; font-weight: 600;
  }
  .footer-col ul { list-style: none; }
  .footer-col li { margin-bottom: 0.5rem; }
  .footer-col a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
  .footer-col a:hover { color: var(--gold); }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,0.08); padding-top: 2rem;
    display: flex; justify-content: space-between; align-items: center;
    color: rgba(255,255,255,0.4); font-size: 0.85rem; flex-wrap: wrap; gap: 1rem;
  }

  /* ============ Loading state ============ */
  .loading {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    color: var(--gray-500); font-size: 0.95rem;
  }
  .error-box {
    max-width: 600px; margin: 6rem auto; padding: 2rem;
    background: #fee2e2; border-left: 4px solid var(--red);
    border-radius: 8px; color: #7f1d1d;
  }

  /* ============ MOBILE ============ */
  @media (max-width: 968px) {
    .nav-links {
      position: fixed; top: 73px; left: 0; right: 0;
      background: var(--white); flex-direction: column;
      padding: 2rem; gap: 1.5rem;
      border-bottom: 1px solid var(--gray-100);
      transform: translateY(-150%); transition: transform 0.3s;
    }
    .nav-links.open { transform: translateY(0); }
    .nav-toggle { display: block; }
  }
  @media (max-width: 600px) {
    section { padding: 4rem 0; }
    .container, .nav-container { padding-left: 1.25rem; padding-right: 1.25rem; }
    .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
    .footer-bottom { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading">Laddar...</div>
</div>

<script>
  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function emblemSvg(extraClass = '') {
    return `<img src="images/BK LOET EMBLEM_Modern.svg" alt="BK Loet emblem" class="${extraClass}" style="width:100%;height:100%;object-fit:contain;">`;
  }

  function renderNavbar(data) {
    return `
      <nav class="navbar">
        <div class="nav-container">
          <a href="index.html" class="nav-logo">
            <div class="nav-logo-mark">${emblemSvg()}</div>
            <div>
              <div class="nav-logo-text">${escapeHtml(data.klubb.namn)}</div>
              <span class="nav-logo-sub">Bowlingklubb · ${escapeHtml(data.klubb.ort)}</span>
            </div>
          </a>
          <button class="nav-toggle" id="navToggle" aria-label="Meny">
            <span></span><span></span><span></span>
          </button>
          <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Startsida</a></li>
            <li><a href="spelare.html">Våra spelare</a></li>
            <li><a href="index.html#om-oss">Om oss</a></li>
            <li><a href="sponsorer.html">Sponsorer</a></li>
            <li><a href="tabell.html" class="active">Tabell</a></li>
            <li><a href="index.html#medlem" class="nav-cta">Bli medlem</a></li>
          </ul>
        </div>
      </nav>`;
  }

  function renderFooter(data) {
    return `
      <footer>
        <div class="container">
          <div class="footer-grid">
            <div>
              <div class="footer-brand">
                <div style="width:36px;height:36px;">${emblemSvg()}</div>
                <div class="footer-brand-text">${escapeHtml(data.klubb.namn)}</div>
              </div>
              <p class="footer-tagline">Bowlingklubb i ${escapeHtml(data.klubb.ort)} · ${escapeHtml(data.klubb.serie)} · Sikte på Elitserien.</p>
            </div>
            <div class="footer-col">
              <h4>Klubben</h4>
              <ul>
                <li><a href="index.html#om-oss">Om oss</a></li>
                <li><a href="spelare.html">Spelare</a></li>
                <li><a href="sponsorer.html">Sponsorer</a></li>
                <li><a href="tabell.html">Tabell</a></li>
                <li><a href="index.html#medlem">Bli medlem</a></li>
              </ul>
            </div>
            <div class="footer-col">
              <h4>Kontakt</h4>
              <ul>
                <li><a href="mailto:${escapeHtml(data.kontakt.email)}">${escapeHtml(data.kontakt.email)}</a></li>
                <li><a href="tel:${escapeHtml(data.kontakt.telefon_lank)}">${escapeHtml(data.kontakt.telefon)}</a></li>
                <li>${escapeHtml(data.kontakt.hall)}</li>
              </ul>
            </div>
            <div class="footer-col">
              <h4>Följ oss</h4>
              <ul>
                <li><a href="${escapeHtml(data.kontakt.instagram)}">Instagram</a></li>
                <li><a href="${escapeHtml(data.kontakt.facebook)}">Facebook</a></li>
                <li><a href="${escapeHtml(data.kontakt.lulea_open)}">Luleå Open</a></li>
              </ul>
            </div>
          </div>
          <div class="footer-bottom">
            <div>© ${new Date().getFullYear()} ${escapeHtml(data.klubb.namn)}. Alla rättigheter förbehållna.</div>
            <div>Bowlingklubb · ${escapeHtml(data.klubb.ort)} · Norrbotten</div>
          </div>
        </div>
      </footer>`;
  }

  function renderTable(data) {
    const rows = data.tabell.lag.map((lag, i) => {
      const pos = i + 1;
      const isOurs = lag.namn === data.klubb.namn;
      const inPromotion = pos <= data.tabell.kvalplatser;
      const indicator = inPromotion ? '<span class="promotion-indicator"></span>' : '';
      return `
        <tr class="${isOurs ? 'our-team' : ''}">
          <td class="position-cell">${indicator}${pos}</td>
          <td>${escapeHtml(lag.namn)}</td>
          <td>${lag.matcher}</td>
          <td>${lag.vunna}</td>
          <td>${lag.oavgjorda}</td>
          <td>${lag.forlorade}</td>
          <td>${lag.skillnad}</td>
          <td>${lag.poang}</td>
        </tr>`;
    }).join('');

    return `
      <section id="tabell">
        <div class="container">
          <div class="table-wrapper">
            <div class="table-header">
              <div class="table-title">${escapeHtml(data.tabell.titel)}</div>
              <div class="table-season">${escapeHtml(data.tabell.saesong)}</div>
            </div>
            <table class="league-table">
              <thead><tr><th>#</th><th>Lag</th><th>M</th><th>V</th><th>O</th><th>F</th><th>+/−</th><th>P</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
            <div class="table-legend">
              <div class="legend-item"><span class="legend-dot"></span> Kvalplats till Elitserien</div>
              <div class="legend-item">M = Matcher · V = Vunna · O = Oavgjorda · F = Förlorade · P = Poäng</div>
            </div>
          </div>
          <div class="table-disclaimer">Tabellen uppdaterad: ${escapeHtml(data.tabell.uppdaterad)}</div>
        </div>
      </section>`;
  }

  function showError(message, details) {
    document.getElementById('app').innerHTML = `
      <div class="error-box">
        <h3>Kunde inte ladda sidan</h3>
        <p>${escapeHtml(message)}</p>
        ${details ? `<p style="margin-top:1rem;font-size:0.9rem;"><code>${escapeHtml(details)}</code></p>` : ''}
      </div>`;
  }

  async function init() {
    try {
      const res = await fetch('data.json?v=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      document.title = `Tabell — ${data.klubb.namn}`;

      document.getElementById('app').innerHTML =
        renderNavbar(data) +
        `<div class="page-header">
          <span class="section-eyebrow">${escapeHtml(data.klubb.serie)}</span>
          <h1>Tabellen</h1>
          <p>Så här ligger det till i serien. ${escapeHtml(data.klubb.namn)} jagar topp ${data.tabell.kvalplatser} för kvalplats till Elitserien.</p>
        </div>` +
        renderTable(data) +
        renderFooter(data);

      const toggle = document.getElementById('navToggle');
      const links = document.getElementById('navLinks');
      if (toggle && links) {
        toggle.addEventListener('click', () => links.classList.toggle('open'));
        links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => links.classList.remove('open')));
      }
    } catch (err) {
      showError('Kontrollera att filen data.json finns och har giltigt JSON-format.', err.message);
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
