<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BK Loet — Bowlingklubb i Luleå</title>
<meta name="description" content="BK Loet är Luleås bowlingklubb i Allsvenskan med sikte på Elitserien.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1f4d;
    --navy-deep: #061230;
    --blue: #1d4fc4;
    --blue-bright: #2563eb;
    --gold: #f5c518;
    --gold-soft: #fde68a;
    --red: #dc2626;
    --white: #ffffff;
    --off-white: #fafaf9;
    --gray-50: #f8f9fc;
    --gray-100: #eef1f6;
    --gray-300: #cbd2dc;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--gray-900);
    background: var(--white);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }

  /* ============ NAVBAR ============ */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-100);
  }
  .nav-container {
    max-width: 1280px; margin: 0 auto; padding: 1rem 2rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 0.75rem;
    text-decoration: none; color: var(--navy);
  }
  .nav-logo-mark { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }
  .nav-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 0.05em; color: var(--navy);
  }
  .nav-logo-sub {
    font-size: 0.65rem; color: var(--gray-500);
    text-transform: uppercase; letter-spacing: 0.15em;
    display: block; margin-top: -2px;
  }
  .nav-links { display: flex; list-style: none; gap: 2rem; align-items: center; }
  .nav-links a {
    text-decoration: none; color: var(--gray-700);
    font-weight: 500; font-size: 0.9rem; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--blue); }
  .nav-cta {
    background: var(--navy); color: var(--white) !important;
    padding: 0.6rem 1.25rem; border-radius: 6px; transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--blue) !important; color: var(--white) !important; }
  .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; }
  .nav-toggle span {
    display: block; width: 24px; height: 2px;
    background: var(--navy); margin: 5px 0; transition: all 0.3s;
  }

  /* ============ HERO ============ */
  .hero {
    position: relative; min-height: 100vh;
    display: flex; align-items: center; overflow: hidden;
    padding-top: 80px;
    background:
      radial-gradient(ellipse at top right, rgba(29, 79, 196, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(245, 197, 24, 0.08) 0%, transparent 50%),
      linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 100%);
  }
  .hero-pattern {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(255,255,255,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(245,197,24,0.06) 0%, transparent 40%);
    opacity: 0.6;
  }
  .hero-container {
    max-width: 1440px; margin: 0 auto; padding: 3rem 2rem;
    position: relative; z-index: 2;
    display: grid; grid-template-columns: 1fr 1fr; gap: 3rem;
    align-items: center; width: 100%;
  }
  .hero-content { color: var(--white); }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(245, 197, 24, 0.15); color: var(--gold);
    padding: 0.4rem 0.9rem; border-radius: 100px;
    font-size: 0.75rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 1.5rem;
    border: 1px solid rgba(245, 197, 24, 0.3);
  }
  .hero-eyebrow::before {
    content: ''; width: 6px; height: 6px;
    background: var(--gold); border-radius: 50%;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 7vw, 6rem); line-height: 0.95;
    letter-spacing: 0.01em; margin-bottom: 1.5rem;
  }
  .hero h1 .accent { color: var(--gold); display: block; }
  .hero p.lead {
    font-size: 1.15rem; color: rgba(255, 255, 255, 0.85);
    max-width: 540px; margin-bottom: 2.5rem; font-weight: 300;
  }
  .hero-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.9rem 1.75rem; border-radius: 6px;
    font-weight: 600; font-size: 0.95rem;
    text-decoration: none; transition: all 0.2s;
    cursor: pointer; border: none; font-family: inherit;
  }
  .btn-primary { background: var(--gold); color: var(--navy-deep); }
  .btn-primary:hover {
    background: var(--gold-soft); transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(245, 197, 24, 0.3);
  }
  .btn-ghost {
    background: transparent; color: var(--white);
    border: 1.5px solid rgba(255, 255, 255, 0.3);
  }
  .btn-ghost:hover { border-color: var(--white); background: rgba(255, 255, 255, 0.1); }
  .btn-arrow { transition: transform 0.2s; }
  .btn:hover .btn-arrow { transform: translateX(4px); }

  .hero-visual {
    position: relative; aspect-ratio: 4/5;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .slideshow { position: absolute; inset: 0; }
  .slide {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 1.5s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .slide.active { opacity: 1; }
  .slide-1 { background: linear-gradient(135deg, var(--blue) 0%, var(--navy) 100%); }
  .slide-2 { background: linear-gradient(135deg, var(--navy) 0%, var(--blue-bright) 100%); }
  .slide-3 { background: linear-gradient(135deg, var(--navy-deep) 0%, var(--blue) 100%); }
  .slide-content { display: flex; flex-direction: column; align-items: center; text-align: center; color: var(--white); padding: 2rem; }
  .slide-emblem { width: 360px; height: 360px; margin: 0 auto 1.5rem; }
  .slide-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 0.05em; color: var(--gold);
  }
  .slide-sublabel {
    font-size: 0.85rem; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 0.2em; margin-top: 0.5rem;
  }
  .slide-foto {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover; object-position: center;
  }
  .slide-foto-caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 2.5rem 1.5rem 1.75rem;
    background: linear-gradient(to top, rgba(10,31,77,0.75) 0%, transparent 100%);
    text-align: center;
  }
  .slide-foto-caption .slide-sublabel { margin-top: 0; }
  .slide-indicators {
    position: absolute; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 0.5rem; z-index: 5;
  }
  .indicator {
    width: 32px; height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 100px; cursor: pointer;
    transition: background 0.3s; border: none; padding: 0;
  }
  .indicator.active { background: var(--gold); }
  .slide-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 10; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
    border: none; cursor: pointer; color: var(--white);
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.25rem; line-height: 1;
    opacity: 0; transition: opacity 0.3s ease, background 0.2s;
  }
  .slide-arrow.prev { left: 0.75rem; }
  .slide-arrow.next { right: 0.75rem; }
  .hero-visual:hover .slide-arrow { opacity: 1; }
  .slide-arrow:hover { background: rgba(0,0,0,0.6); }
  .photo-placeholder {
    position: absolute; bottom: 1rem; left: 1rem; right: 1rem;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
    color: var(--white); padding: 0.5rem 1rem;
    border-radius: 6px; font-size: 0.75rem;
    text-align: center; z-index: 4;
  }

  /* ============ SECTION GENERAL ============ */
  section { padding: 6rem 0; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
  .section-header { text-align: center; margin-bottom: 4rem; }
  .section-eyebrow {
    color: var(--blue); font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.2em;
    margin-bottom: 0.75rem; display: inline-block;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.25rem, 4vw, 3.5rem);
    color: var(--navy); line-height: 1; margin-bottom: 1rem;
  }
  .section-subtitle {
    color: var(--gray-500); max-width: 600px;
    margin: 0 auto; font-size: 1.05rem;
  }

  /* ============ SPELARE ============ */
  #spelare { background: var(--gray-50); }
  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.5rem;
  }
  .player-card {
    background: var(--white); border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(10, 31, 77, 0.06);
    transition: all 0.3s;
    border: 1px solid var(--gray-100);
  }
  .player-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(10, 31, 77, 0.12);
  }
  .player-image {
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    position: relative; display: flex;
    align-items: center; justify-content: center;
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem; overflow: hidden;
  }
  .player-image::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at top right, rgba(245,197,24,0.2) 0%, transparent 60%);
  }
  .player-number {
    position: absolute; top: 0.75rem; right: 1rem;
    background: var(--gold); color: var(--navy-deep);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem; padding: 0.15rem 0.65rem;
    border-radius: 4px; letter-spacing: 0.05em;
  }
  .player-info { padding: 1.25rem 1.5rem 1.5rem; }
  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; color: var(--navy);
    letter-spacing: 0.02em; margin-bottom: 0.25rem;
  }
  .player-role {
    color: var(--gray-500); font-size: 0.85rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }
  .player-stats {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem; padding-top: 1rem;
    border-top: 1px solid var(--gray-100);
  }
  .stat { text-align: center; }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; color: var(--blue); line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem; color: var(--gray-500);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-top: 0.25rem;
  }

  /* ============ OM OSS ============ */
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 5rem; align-items: center;
  }
  .about-text h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.25rem, 4vw, 3.5rem);
    color: var(--navy); line-height: 1; margin-bottom: 1.5rem;
  }
  .about-text p {
    color: var(--gray-700); margin-bottom: 1.25rem; font-size: 1.05rem;
  }
  .about-stats {
    margin-top: 2.5rem;
  }
  .about-stat {
    background: var(--gray-50); padding: 1.5rem 1.75rem;
    border-radius: 10px;
    border-left: 3px solid var(--gold);
  }
  .about-stat-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; color: var(--navy);
    letter-spacing: 0.04em; margin-bottom: 0.5rem;
  }
  .about-stat-body {
    font-size: 0.9rem; color: var(--gray-700); margin-bottom: 1rem;
  }
  .about-contact-link {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--navy); color: var(--white);
    padding: 0.6rem 1.25rem; border-radius: 6px;
    font-size: 0.9rem; font-weight: 600; text-decoration: none;
    transition: background 0.2s;
  }
  .about-contact-link:hover { background: var(--blue); }
  .about-visual {
    display: flex; align-items: center; justify-content: center;
    align-self: stretch;
    background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 100%);
    border-radius: 20px;
    padding: 2rem;
  }
  .about-emblem {
    width: 80%; max-width: 400px;
    height: auto; display: block;
  }

  /* ============ SPONSORER ============ */
  #sponsorer { background: var(--gray-50); }
  .sponsor-tier {
    margin-bottom: 3rem;
  }
  .sponsor-tier:last-child { margin-bottom: 0; }
  .sponsor-tier-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; color: var(--navy);
    letter-spacing: 0.05em; margin-bottom: 1.5rem;
    text-align: center;
    display: flex; align-items: center; gap: 1rem;
    justify-content: center;
  }
  .sponsor-tier-title::before, .sponsor-tier-title::after {
    content: ''; flex: 1; max-width: 80px;
    height: 1px; background: var(--gray-300);
  }
  .sponsor-grid {
    display: grid; gap: 1.25rem;
  }
  .sponsor-grid.huvud { grid-template-columns: 1fr; max-width: 600px; margin: 0 auto; }
  .sponsor-grid.guld { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .sponsor-grid.silver { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
  .sponsor-grid.brons { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }

  .sponsor-card {
    background: var(--white); border-radius: 12px;
    padding: 1.75rem; text-align: center;
    border: 1px solid var(--gray-100);
    transition: all 0.3s;
    text-decoration: none; color: inherit;
    display: block;
  }
  .sponsor-card:hover {
    transform: translateY(-3px);
    border-color: var(--blue);
    box-shadow: 0 8px 24px rgba(10, 31, 77, 0.1);
  }
  .sponsor-card.huvud {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: var(--white); border: none;
    padding: 2.5rem 2rem;
  }
  .sponsor-card.huvud .sponsor-name { color: var(--gold); }
  .sponsor-card.huvud .sponsor-desc { color: rgba(255,255,255,0.85); }

  .sponsor-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; color: var(--navy);
    letter-spacing: 0.03em; margin-bottom: 0.5rem;
  }
  .sponsor-card.huvud .sponsor-name { font-size: 2rem; }
  .sponsor-desc {
    color: var(--gray-500); font-size: 0.9rem;
    line-height: 1.5;
  }

  /* ============ BLI MEDLEM ============ */
  #medlem {
    background: linear-gradient(180deg, var(--gray-50) 0%, var(--white) 100%);
    padding-top: 7rem; padding-bottom: 7rem;
  }
  .membership-grid {
    display: flex; gap: 1.5rem;
    justify-content: center; align-items: stretch;
    flex-wrap: wrap; margin-bottom: 3rem;
  }
  .membership-card {
    background: var(--white); border: 2px solid var(--gray-100);
    border-radius: 20px; padding: 3rem 2.75rem;
    position: relative; transition: all 0.3s;
    text-align: center;
    flex: 1 1 440px; max-width: 520px;
    display: flex; flex-direction: column;
  }
  .membership-card.featured {
    border-color: var(--blue);
    box-shadow: 0 24px 60px rgba(29, 79, 196, 0.18), 0 4px 16px rgba(0,0,0,0.06);
  }
  .membership-ingress {
    color: var(--gray-500); font-size: 1rem;
    margin-bottom: 2rem; font-style: italic;
  }
  .membership-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; color: var(--navy); margin-bottom: 0.75rem;
  }
  .membership-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem; color: var(--navy); line-height: 1; margin-bottom: 0.25rem;
  }
  .membership-price span {
    font-size: 1rem; color: var(--gray-500);
    font-family: 'Inter', sans-serif; font-weight: 400;
  }
  .membership-period {
    color: var(--gray-500); font-size: 0.9rem; margin-bottom: 2rem;
    padding-bottom: 2rem; border-bottom: 1px solid var(--gray-100);
  }
  .membership-features { list-style: none; margin-bottom: 2.5rem; text-align: left; }
  .membership-features li {
    padding: 0.55rem 0; color: var(--gray-700);
    font-size: 0.95rem; display: flex;
    align-items: start; gap: 0.6rem;
    border-bottom: 1px solid var(--gray-100);
  }
  .membership-features li:last-child { border-bottom: none; }
  .check { color: var(--blue); font-weight: 700; flex-shrink: 0; }
  .membership-card.sponsor {
    border-color: var(--gold);
    box-shadow: 0 24px 60px rgba(245, 197, 24, 0.15), 0 4px 16px rgba(0,0,0,0.06);
  }
  .sponsor-icon {
    font-size: 2rem; margin-bottom: 0.75rem; display: block;
  }
  .membership-sponsor-text {
    color: var(--gray-700); font-size: 0.95rem; line-height: 1.65;
    margin-bottom: 1.5rem;
  }
  .membership-sponsor-features {
    list-style: none; margin-bottom: 0; text-align: left; flex: 1;
  }
  .membership-sponsor-features li {
    padding: 0.5rem 0; color: var(--gray-700);
    font-size: 0.95rem; display: flex; align-items: start; gap: 0.6rem;
    border-bottom: 1px solid var(--gray-100);
  }
  .membership-sponsor-features li:last-child { border-bottom: none; }
  .check-gold { color: var(--gold); font-weight: 700; flex-shrink: 0; }
  .membership-btn {
    width: 100%; padding: 1rem;
    border-radius: 8px; border: 2px solid transparent;
    background: var(--gray-100); color: var(--navy);
    font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: inherit; font-size: 1rem;
    margin-top: auto; padding-top: 1rem; text-decoration: none;
    display: block; box-sizing: border-box;
  }
  .membership-card.featured .membership-btn {
    background: var(--navy); color: var(--white);
    box-shadow: 0 4px 14px rgba(10, 31, 77, 0.25);
  }
  .membership-btn.gold {
    background: var(--gold); color: var(--navy-deep);
    border-color: var(--gold);
    box-shadow: 0 4px 14px rgba(245, 197, 24, 0.3);
  }
  .membership-btn:hover { transform: translateY(-2px); }
  .membership-card.featured .membership-btn:hover {
    background: var(--blue);
    box-shadow: 0 6px 18px rgba(29, 79, 196, 0.35);
  }
  .membership-btn.gold:hover {
    background: var(--gold-soft); color: var(--navy-deep);
    box-shadow: 0 6px 18px rgba(245, 197, 24, 0.45);
  }

  .contact-form {
    max-width: 600px; margin: 0 auto;
    background: var(--white); padding: 2.5rem;
    border-radius: 16px;
    border: 1px solid var(--gray-100);
    box-shadow: 0 4px 20px rgba(10, 31, 77, 0.04);
  }
  .form-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1rem; margin-bottom: 1rem;
  }
  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block; color: var(--gray-700);
    font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem;
  }
  .form-group input, .form-group textarea {
    width: 100%; padding: 0.75rem 1rem;
    border: 1.5px solid var(--gray-100);
    border-radius: 8px;
    font-family: inherit; font-size: 0.95rem;
    transition: border 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none; border-color: var(--blue);
  }
  .form-submit {
    width: 100%; padding: 1rem;
    background: var(--navy); color: var(--white);
    border: none; border-radius: 8px;
    font-family: inherit; font-weight: 600;
    font-size: 1rem; cursor: pointer;
    transition: background 0.2s; margin-top: 0.5rem;
  }
  .form-submit:hover { background: var(--blue); }

  /* ============ KONTAKT ============ */
  section#kontakt { background: var(--gray-50); }
  .kontakt-grid-personer {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem;
    margin-bottom: 3rem;
  }
  .kontakt-kort {
    background: var(--white); border-radius: 12px;
    border: 1px solid var(--gray-100); padding: 1.5rem 2rem;
  }
  .kontakt-roll {
    font-size: 0.7rem; font-weight: 700; color: var(--gray-500);
    text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.35rem;
  }
  .kontakt-namn {
    font-weight: 600; font-size: 1.05rem; color: var(--gray-900); margin-bottom: 0.6rem;
  }
  .kontakt-telefon {
    display: inline-flex; align-items: center; gap: 0.5rem;
    color: var(--blue); font-size: 0.9rem; text-decoration: none; font-weight: 500;
  }
  .kontakt-telefon:hover { color: var(--navy); }
  .kontakt-separator {
    display: flex; align-items: center; gap: 1.5rem;
    margin: 0 0 3rem; color: var(--gray-500); font-size: 0.85rem; white-space: nowrap;
  }
  .kontakt-separator::before,
  .kontakt-separator::after { content: ''; flex: 1; height: 1px; background: var(--gray-300); }
  .kontakt-grid-social {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
  }
  .kontakt-social-kort {
    background: var(--white); border-radius: 12px;
    border: 1px solid var(--gray-100); padding: 1.75rem 1.5rem; text-align: center;
  }
  .kontakt-social-ikon { font-size: 1.75rem; margin-bottom: 0.5rem; }
  .kontakt-social-label {
    font-size: 0.7rem; font-weight: 700; color: var(--gray-500);
    text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.4rem;
  }
  .kontakt-social-link {
    color: var(--blue); text-decoration: none; font-size: 0.9rem; font-weight: 500;
  }
  .kontakt-social-link:hover { text-decoration: underline; color: var(--navy); }
  .kontakt-hall-kort {
    background: var(--white); border-radius: 12px;
    border: 1px solid var(--gray-100); padding: 1.5rem 2rem;
    grid-column: span 3; display: flex; align-items: center; gap: 1.25rem;
  }
  .kontakt-hall-text { font-weight: 600; color: var(--gray-900); font-size: 1rem; }
  .kontakt-hall-sub { font-size: 0.875rem; color: var(--gray-500); margin-top: 0.15rem; }
  .kontakt-traning-rad {
    display: flex; align-items: center; gap: 0.75rem;
    background: var(--gray-100); border-radius: 8px;
    padding: 1rem 1.5rem; margin-top: 2rem;
    color: var(--gray-700); font-size: 0.9rem;
  }

  /* ============ FOOTER ============ */
  footer {
    background: #030814; color: rgba(255,255,255,0.7);
    padding: 4rem 0 2rem;
  }
  .footer-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 3rem; margin-bottom: 3rem;
  }
  .footer-brand {
    display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;
  }
  .footer-brand-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; color: var(--white); letter-spacing: 0.05em;
  }
  .footer-tagline {
    color: rgba(255,255,255,0.5); font-size: 0.9rem;
    max-width: 320px; line-height: 1.6;
  }
  .footer-col h4 {
    color: var(--white); font-size: 0.85rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 1rem; font-weight: 600;
  }
  .footer-col ul { list-style: none; }
  .footer-col li { margin-bottom: 0.5rem; }
  .footer-col a {
    color: rgba(255,255,255,0.6); text-decoration: none;
    font-size: 0.9rem; transition: color 0.2s;
  }
  .footer-col a:hover { color: var(--gold); }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 2rem;
    display: flex; justify-content: space-between;
    align-items: center; color: rgba(255,255,255,0.4);
    font-size: 0.85rem; flex-wrap: wrap; gap: 1rem;
  }

  /* ============ Loading state ============ */
  .loading {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    color: var(--gray-500); font-size: 0.95rem;
  }
  .error-box {
    max-width: 600px; margin: 6rem auto;
    padding: 2rem; background: #fee2e2;
    border-left: 4px solid var(--red);
    border-radius: 8px; color: #7f1d1d;
  }
  .error-box h3 { margin-bottom: 0.5rem; }
  .error-box code {
    background: rgba(0,0,0,0.05); padding: 0.1rem 0.4rem;
    border-radius: 3px; font-size: 0.9em;
  }

  /* ============ MOBILE ============ */
  @media (max-width: 968px) {
    .hero-container, .about-grid {
      grid-template-columns: 1fr; gap: 3rem;
    }
    .footer-grid { grid-template-columns: 1fr 1fr; }
    .nav-links {
      position: fixed; top: 73px; left: 0; right: 0;
      background: var(--white); flex-direction: column;
      padding: 2rem; gap: 1.5rem;
      border-bottom: 1px solid var(--gray-100);
      transform: translateY(-150%);
      transition: transform 0.3s;
    }
    .nav-links.open { transform: translateY(0); }
    .nav-toggle { display: block; }
    .hero-visual { max-width: 400px; margin: 0 auto; }
    .membership-card.featured { transform: none; }
  }
  @media (max-width: 600px) {
    section { padding: 4rem 0; }
    .container, .nav-container, .hero-container {
      padding-left: 1.25rem; padding-right: 1.25rem;
    }
    .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
    .form-row { grid-template-columns: 1fr; }
    .league-table th, .league-table td {
      padding: 0.75rem 0.5rem; font-size: 0.85rem;
    }
    .league-table th:nth-child(4), .league-table td:nth-child(4),
    .league-table th:nth-child(5), .league-table td:nth-child(5),
    .league-table th:nth-child(6), .league-table td:nth-child(6) {
      display: none;
    }
    .footer-bottom { flex-direction: column; text-align: center; }
    .kontakt-grid-personer { grid-template-columns: 1fr; }
    .kontakt-grid-social { grid-template-columns: 1fr; }
    .kontakt-hall-kort { grid-column: span 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero-content > * { animation: fadeUp 0.8s ease backwards; }
  .hero-eyebrow { animation-delay: 0.1s; }
  .hero h1 { animation-delay: 0.2s; }
  .hero p.lead { animation-delay: 0.35s; }
  .hero-buttons { animation-delay: 0.5s; }
  .hero-visual { animation: fadeUp 1s ease 0.4s backwards; }
</style>
</head>
<body>


<!-- Här renderas hela sidan av JS från data.json -->
<div id="app">
  <div class="loading">Laddar...</div>
</div>

<script>
  // ============================================================
  // Renderar hela sidan från data.json
  // ============================================================

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function emblemSvg(extraClass = '') {
    return `<img src="images/BK LOET EMBLEM_Modern.svg" alt="BK Loet emblem" class="${extraClass}" style="width:100%;height:100%;object-fit:contain;">`;
  }

  function renderNavbar(data) {
    return `
      <nav class="navbar">
        <div class="nav-container">
          <a href="#" class="nav-logo">
            <div class="nav-logo-mark">${emblemSvg()}</div>
            <div>
              <div class="nav-logo-text">${escapeHtml(data.klubb.namn)}</div>
              <span class="nav-logo-sub">Bowlingklubb · ${escapeHtml(data.klubb.ort)}</span>
            </div>
          </a>
          <button class="nav-toggle" id="navToggle" aria-label="Meny">
            <span></span><span></span><span></span>
          </button>
          <ul class="nav-links" id="navLinks">
            <li><a href="index.html" class="active">Startsida</a></li>
            <li><a href="spelare.html">Våra spelare</a></li>
            <li><a href="sponsorer.html">Sponsorer</a></li>
            <li><a href="tabell.html">Tabell</a></li>
            <li><a href="#kontakt">Kontakta oss</a></li>
            <li><a href="#medlem" class="nav-cta">Bli medlem</a></li>
          </ul>
        </div>
      </nav>`;
  }

  function renderSlide(slide, index, isActive) {
    const cls = `slide slide-${index + 1}${isActive ? ' active' : ''}`;
    if (slide.typ === 'foto') {
      return `
        <div class="${cls}">
          <img class="slide-foto" src="${escapeHtml(slide.src)}" alt="${escapeHtml(slide.underrubrik)}">
          <div class="slide-foto-caption">
            <div class="slide-sublabel">${escapeHtml(slide.underrubrik)}</div>
          </div>
        </div>`;
    }
    if (slide.typ === 'emblem') {
      return `
        <div class="${cls}">
          <div class="slide-content">
            <div class="slide-emblem">${emblemSvg()}</div>
            <div class="slide-label">${escapeHtml(slide.rubrik)}</div>
            <div class="slide-sublabel">${escapeHtml(slide.underrubrik)}</div>
          </div>
        </div>`;
    }
    return `
      <div class="${cls}">
        <div class="slide-content">
          <div class="slide-label" style="font-size: 4rem;">${escapeHtml(slide.stor_text)}</div>
          <div class="slide-label">${escapeHtml(slide.rubrik)}</div>
          <div class="slide-sublabel">${escapeHtml(slide.underrubrik)}</div>
        </div>
      </div>`;
  }

  function renderHero(data) {
    const slides = data.bildspel.map((s, i) => renderSlide(s, i, i === 0)).join('');
    const indicators = data.bildspel.map((_, i) =>
      `<button class="indicator${i === 0 ? ' active' : ''}" data-slide="${i}" aria-label="Bild ${i + 1}"></button>`
    ).join('');

    return `
      <section class="hero">
        <div class="hero-pattern"></div>
        <div class="hero-container">
          <div class="hero-content">
            <span class="hero-eyebrow">${escapeHtml(data.klubb.serie)} · ${escapeHtml(data.klubb.saesong)}</span>
            <h1>Bowling med<span class="accent">passion & precision</span></h1>
            <p class="lead">${escapeHtml(data.klubb.lead)}</p>
            <div class="hero-buttons">
              <a href="#medlem" class="btn btn-primary">Bli medlem <span class="btn-arrow">→</span></a>
              <a href="#om-oss" class="btn btn-ghost">Läs mer om oss</a>
            </div>
          </div>
          <div class="hero-visual">
            <button class="slide-arrow prev" aria-label="Föregående bild">&#8592;</button>
            <div class="slideshow">${slides}</div>
            <div class="slide-indicators">${indicators}</div>
            <button class="slide-arrow next" aria-label="Nästa bild">&#8594;</button>
          </div>
        </div>
      </section>`;
  }

  function renderPlayer(p) {
    return `
      <div class="player-card">
        <div class="player-image">
          <span>${escapeHtml(p.initialer)}</span>
          <span class="player-number">#${escapeHtml(p.nummer)}</span>
        </div>
        <div class="player-info">
          <div class="player-name">${escapeHtml(p.namn)}</div>
          <div class="player-role">${escapeHtml(p.roll)}</div>
          <div class="player-stats">
            <div class="stat">
              <div class="stat-value">${escapeHtml(p.snitt)}</div>
              <div class="stat-label">Snitt</div>
            </div>
            <div class="stat">
              <div class="stat-value">${escapeHtml(p.matcher)}</div>
              <div class="stat-label">Matcher</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderPlayers(data) {
    return `
      <section id="spelare">
        <div class="container">
          <div class="section-header">
            <span class="section-eyebrow">Truppen</span>
            <h2 class="section-title">Våra spelare</h2>
            <p class="section-subtitle">Möt spelarna som representerar ${escapeHtml(data.klubb.namn)} i ${escapeHtml(data.klubb.serie)} denna säsong.</p>
          </div>
          <div class="players-grid">
            ${data.spelare.map(renderPlayer).join('')}
          </div>
        </div>
      </section>`;
  }

  function renderAbout(data) {
    const stycken = data.om_oss.stycken.map(s => `<p>${escapeHtml(s)}</p>`).join('');

    return `
      <section id="om-oss">
        <div class="container">
          <div class="about-grid">
            <div class="about-text">
<h2>${escapeHtml(data.om_oss.rubrik)}</h2>
              ${stycken}
              <div class="about-stats">
                <div class="about-stat">
                  <div class="about-stat-heading">Kontakta oss</div>
                  <div class="about-stat-body">Intresserad av att bowla med oss? Hör av dig — de två första träningarna bjuder vi på.</div>
                </div>
              </div>
            </div>
            <div class="about-visual"><img src="images/BK LOET EMBLEM_Modern.svg" alt="BK Loet emblem" class="about-emblem"></div>
          </div>
        </div>
      </section>`;
  }

  function renderSponsorTier(title, sponsors, tierClass) {
    if (!sponsors.length) return '';
    const cards = sponsors.map(s => `
      <a class="sponsor-card ${tierClass}" href="${escapeHtml(s.lank || '#')}" ${s.lank && s.lank !== '#' ? 'target="_blank" rel="noopener"' : ''}>
        <div class="sponsor-name">${escapeHtml(s.namn)}</div>
        <div class="sponsor-desc">${escapeHtml(s.beskrivning)}</div>
      </a>`).join('');
    return `
      <div class="sponsor-tier">
        <h3 class="sponsor-tier-title">${escapeHtml(title)}</h3>
        <div class="sponsor-grid ${tierClass}">${cards}</div>
      </div>`;
  }

  function renderSponsors(data) {
    const grupper = {
      'Huvudsponsor': { lista: [], klass: 'huvud' },
      'Guldsponsor':  { lista: [], klass: 'guld' },
      'Silversponsor':{ lista: [], klass: 'silver' },
      'Bronssponsor': { lista: [], klass: 'brons' }
    };
    data.sponsorer.forEach(s => {
      if (grupper[s.niva]) grupper[s.niva].lista.push(s);
    });

    const tiers = Object.entries(grupper)
      .map(([titel, g]) => renderSponsorTier(titel, g.lista, g.klass))
      .join('');

    return `
      <section id="sponsorer">
        <div class="container">
          <div class="section-header">
            <span class="section-eyebrow">Partners</span>
            <h2 class="section-title">Våra sponsorer</h2>
            <p class="section-subtitle">Företagen som gör det möjligt för oss att satsa fullt ut.</p>
          </div>
          ${tiers}
        </div>
      </section>`;
  }

  function renderMembership(data) {
    const cards = data.medlemskap.map(m => {
      const features = m.formaner.map(f => `<li><span class="check">✓</span> ${escapeHtml(f)}</li>`).join('');
      const ingress = m.ingress ? `<div class="membership-ingress">${escapeHtml(m.ingress)}</div>` : '';
      const btnLabel = m.featured ? 'Bli stödmedlem' : `Välj ${escapeHtml(m.titel)}`;
      return `
        <div class="membership-card${m.featured ? ' featured' : ''}">
          <div class="membership-title">${escapeHtml(m.titel)}</div>
          <div class="membership-price">${escapeHtml(m.pris)}<span> kr</span></div>
          <div class="membership-period">${escapeHtml(m.period)}</div>
          ${ingress}
          <ul class="membership-features">${features}</ul>
          <button class="membership-btn">${btnLabel}</button>
        </div>`;
    }).join('');

    const sponsorCard = `
      <div class="membership-card sponsor">
        <div class="membership-title">Sponsra oss</div>
        <span class="sponsor-icon">🤝</span>
        <p class="membership-sponsor-text">Syns där det händer — på banan, på tröjan och på webben. Vi erbjuder sponsorpaket anpassade för både små och stora företag i Norrland.</p>
        <ul class="membership-sponsor-features">
          <li><span class="check-gold">✓</span> Logga på klubbens hemsida</li>
          <li><span class="check-gold">✓</span> Logga på klubbens spelkläder</li>
          <li><span class="check-gold">✓</span> Omnämns i klubbens sociala medier</li>
          <li><span class="check-gold">✓</span> Anpassat paket utifrån era behov</li>
        </ul>
        <a href="sponsorer.html#sponsorpaket" class="membership-btn gold">Se våra sponsorpaket →</a>
      </div>`;

    return `
      <section id="medlem">
        <div class="container">
          <div class="section-header">
            <span class="section-eyebrow">Stöd oss</span>
            <h2 class="section-title">Bli stödmedlem i ${escapeHtml(data.klubb.namn)}</h2>
            <p class="section-subtitle">Stöd en klubb med historia — och få något tillbaka. Ditt bidrag håller bowlingen levande i Luleå.</p>
          </div>
          <div class="membership-grid">${cards}${sponsorCard}</div>
        </div>
      </section>`;
  }

  function renderKontakt(data) {
    const k = data.kontaktsektion;
    const personKort = k.personer.map(p => `
      <div class="kontakt-kort">
        <div class="kontakt-roll">${escapeHtml(p.roll)}</div>
        <div class="kontakt-namn">${escapeHtml(p.namn)}</div>
        <a class="kontakt-telefon" href="tel:${escapeHtml(p.telefon.replace(/\s/g, ''))}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .18h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.09-1.16a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.9v2.02z"/></svg>
          ${escapeHtml(p.telefon)}
        </a>
      </div>`).join('');

    return `
      <section id="kontakt">
        <div class="container">
          <div class="section-header">
            <span class="section-eyebrow">Kontakt</span>
            <h2 class="section-title">${escapeHtml(k.rubrik)}</h2>
            <p class="section-subtitle">${escapeHtml(k.ingress)}</p>
          </div>
          <div class="kontakt-grid-personer">${personKort}</div>
          <div class="kontakt-separator">Kontakta oss eller följ oss på sociala medier</div>
          <div class="kontakt-grid-social">
            <div class="kontakt-social-kort">
              <div class="kontakt-social-ikon">✉️</div>
              <div class="kontakt-social-label">E-post</div>
              <a class="kontakt-social-link" href="mailto:${escapeHtml(k.email)}">${escapeHtml(k.email)}</a>
            </div>
            <div class="kontakt-social-kort">
              <div class="kontakt-social-ikon">📸</div>
              <div class="kontakt-social-label">Instagram</div>
              <a class="kontakt-social-link" href="${escapeHtml(k.instagram_url)}" target="_blank" rel="noopener">@bkloet_bowling</a>
            </div>
            <div class="kontakt-social-kort">
              <div class="kontakt-social-ikon">👥</div>
              <div class="kontakt-social-label">Facebook</div>
              <a class="kontakt-social-link" href="${escapeHtml(k.facebook_url)}" target="_blank" rel="noopener">BK Loet</a>
            </div>
            <div class="kontakt-hall-kort">
              <span style="font-size:1.75rem;">📍</span>
              <div>
                <div class="kontakt-hall-text">${escapeHtml(k.hall)}</div>
                <div class="kontakt-hall-sub">Vår hemmabana</div>
              </div>
            </div>
          </div>
          <div class="kontakt-traning-rad">
            <span style="font-size:1.1rem;">🕖</span>
            <span>Vi tränar tisdagar kl. 19:00 på ${escapeHtml(k.hall)} — säsongen pågår september–april.</span>
          </div>
        </div>
      </section>`;
  }

  function renderFooter(data) {
    return `
      <footer>
        <div class="container">
          <div class="footer-grid">
            <div>
              <div class="footer-brand">
                <div style="width:36px;height:36px;">${emblemSvg()}</div>
                <div class="footer-brand-text">${escapeHtml(data.klubb.namn)}</div>
              </div>
              <p class="footer-tagline">Bowlingklubb i ${escapeHtml(data.klubb.ort)} · ${escapeHtml(data.klubb.serie)}. En klubb där gemenskap och prestation går hand i hand.</p>
            </div>
            <div class="footer-col">
              <h4>Klubben</h4>
              <ul>
                <li><a href="#spelare">Spelare</a></li>
                <li><a href="#sponsorer">Sponsorer</a></li>
                <li><a href="tabell.html">Tabell</a></li>
                <li><a href="#kontakt">Kontakta oss</a></li>
                <li><a href="#medlem">Bli medlem</a></li>
              </ul>
            </div>
            <div class="footer-col">
              <h4>Kontakt</h4>
              <ul>
                <li><a href="mailto:${escapeHtml(data.kontakt.email)}">${escapeHtml(data.kontakt.email)}</a></li>
                <li><a href="tel:${escapeHtml(data.kontakt.telefon_lank)}">${escapeHtml(data.kontakt.telefon)}</a></li>
                <li>${escapeHtml(data.kontakt.hall)}</li>
              </ul>
            </div>
            <div class="footer-col">
              <h4>Följ oss</h4>
              <ul>
                <li><a href="${escapeHtml(data.kontakt.instagram)}">Instagram</a></li>
                <li><a href="${escapeHtml(data.kontakt.facebook)}">Facebook</a></li>
                <li><a href="${escapeHtml(data.kontakt.lulea_open)}">Luleå Open</a></li>
              </ul>
            </div>
          </div>
          <div class="footer-bottom">
            <div>© ${new Date().getFullYear()} ${escapeHtml(data.klubb.namn)}. Alla rättigheter förbehållna.</div>
            <div>Bowlingklubb · ${escapeHtml(data.klubb.ort)} · Norrbotten</div>
          </div>
        </div>
      </footer>`;
  }

  function attachInteractivity() {
    // Mobilmeny
    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    if (toggle && links) {
      toggle.addEventListener('click', () => links.classList.toggle('open'));
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => links.classList.remove('open')));
    }

    // Slideshow
    const slides = document.querySelectorAll('.slide');
    const indicators = document.querySelectorAll('.indicator');
    let current = 0;
    let userHasInteracted = false;
    function showSlide(i) {
      slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
      indicators.forEach((d, idx) => d.classList.toggle('active', idx === i));
      current = i;
    }
    indicators.forEach((dot, i) => dot.addEventListener('click', () => {
      userHasInteracted = true;
      showSlide(i);
    }));
    const prevBtn = document.querySelector('.slide-arrow.prev');
    const nextBtn = document.querySelector('.slide-arrow.next');
    if (prevBtn) prevBtn.addEventListener('click', () => {
      userHasInteracted = true;
      showSlide((current - 1 + slides.length) % slides.length);
    });
    if (nextBtn) nextBtn.addEventListener('click', () => {
      userHasInteracted = true;
      showSlide((current + 1) % slides.length);
    });
    if (slides.length > 1) {
      setInterval(() => { if (!userHasInteracted) showSlide((current + 1) % slides.length); }, 5000);
    }

    // Smooth scroll med kompensering för sticky navbar
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        const id = a.getAttribute('href');
        if (id === '#') return;
        const target = document.querySelector(id);
        if (!target) return;
        e.preventDefault();
        const top = target.getBoundingClientRect().top + window.scrollY - 70;
        window.scrollTo({ top, behavior: 'smooth' });
      });
    });
  }

  function showError(message, details) {
    document.getElementById('app').innerHTML = `
      <div class="error-box">
        <h3>Kunde inte ladda sidan</h3>
        <p>${escapeHtml(message)}</p>
        ${details ? `<p style="margin-top:1rem;font-size:0.9rem;"><code>${escapeHtml(details)}</code></p>` : ''}
        <p style="margin-top:1rem;font-size:0.9rem;">
          Tips: Om du testar lokalt på din dator, öppna sidan via en lokal server
          (se README) — annars blockerar webbläsaren laddning av <code>data.json</code>.
        </p>
      </div>`;
  }

  async function init() {
    try {
      const res = await fetch('data.json?v=' + Date.now()); // ?v=... förhindrar cache
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      document.title = `${data.klubb.namn} — Bowlingklubb i ${data.klubb.ort}`;

      document.getElementById('app').innerHTML =
        renderNavbar(data) +
        renderHero(data) +
        renderAbout(data) +
        renderMembership(data) +
        renderKontakt(data) +
        renderFooter(data);

      attachInteractivity();
    } catch (err) {
      showError('Kontrollera att filen data.json finns och har giltigt JSON-format.', err.message);
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
